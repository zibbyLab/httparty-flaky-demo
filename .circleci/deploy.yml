version: 2.1

# Zibby flaky-test-fixer demo pipeline — runs httparty's REAL RSpec suite PLUS
# the one injected flaky spec (spec/flaky_demo_spec.rb), with JUnit output
# uploaded via store_test_results so CircleCI Insights can flag the flaky test
# across runs. (The Gemfile had its dead `mongrel` pin + the cucumber/aruba
# feature deps removed so `bundle install` resolves on modern Ruby.)
jobs:
  flaky-demo:
    docker:
      - image: cimg/ruby:3.2
    steps:
      - checkout
      - run:
          name: Bundle install
          command: bundle install --jobs 4 --retry 3
      - run:
          name: RSpec — real httparty suite + injected flaky spec (JUnit output)
          command: |
            mkdir -p test-results/rspec
            bundle exec rspec \
              --format progress \
              --format RspecJunitFormatter --out test-results/rspec/results.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results

workflows:
  test:
    jobs:
      - flaky-demo
